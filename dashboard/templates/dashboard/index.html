<!DOCTYPE html>
<html lang="en">
  <head>
    <title>MCK Construction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #111;
        color: white;
      }
      
      /* Background Image Overlay */
      .hero {
        background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover no-repeat;
        height: 100vh;
        position: relative;
      }
      
      .overlay {
        background: rgba(0, 0, 0, 0.75);
        position: absolute;
        width: 100%;
        height: 100%;
      }
      
      .content {
        position: relative;
        z-index: 2;
      }
      
      .title {
        font-size: 45px;
        font-weight: bold;
        color: #ffc107;
      }
      
      .subtitle {
        color: #ccc;
      }
      
      .card-custom {
        background: rgba(28, 28, 28, 0.95); /* more solid */
        border-left: 5px solid #ffc107;
        border-radius: 12px;
        transition: 0.3s;
        color: #fff; /* IMPORTANT */
      }
      
      .card-custom:hover {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(255, 193, 7, 0.3);
      }
      
      .icon {
        font-size: 35px;
        color: #ffc107;
      }
      
      .btn-custom {
        background: #ffc107;
        border: none;
        color: black;
        font-weight: bold;
      }
      
      .btn-custom:hover {
        background: #e0a800;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <div class="overlay"></div>

      <div class="container content text-center pt-5">
        <!-- TITLE -->
        <h1 class="title">🏗️ MCK Construction</h1>
        <p class="subtitle">Building the Future with Precision & Power</p>

        <!-- ROLES -->
        <div class="row mt-5 g-4 justify-content-center">
          <!-- ADMIN -->
          <div class="col-lg-3 col-md-6">
            <div class="card card-custom p-4 text-center">
              <div class="icon mb-2">
                <i class="bi bi-gear-fill"></i>
              </div>
              <h5>Admin Control</h5>
              <p>Monitor site operations & workforce</p>
              <a href="/accounts/login/" class="btn btn-custom w-100">Enter</a>
            </div>
          </div>

          <!-- ACCOUNTS -->
          <div class="col-lg-3 col-md-6">
            <div class="card card-custom p-4 text-center">
              <div class="icon mb-2">
                <i class="bi bi-currency-rupee"></i>
              </div>
              <h5>Accounts</h5>
              <p>Track expenses & financial flow</p>
              <a href="/accounts/login/" class="btn btn-custom w-100">Enter</a>
            </div>
          </div>

          <!-- HR -->
          <div class="col-lg-3 col-md-6">
            <div class="card card-custom p-4 text-center">
              <div class="icon mb-2">
                <i class="bi bi-people-fill"></i>
              </div>
              <h5>HR Management</h5>
              <p>Manage hiring & workforce pipeline</p>
              <a href="/accounts/login/" class="btn btn-custom w-100">Enter</a>
            </div>
          </div>

          <!-- PROJECT -->
          <div class="col-lg-3 col-md-6">
            <div class="card card-custom p-4 text-center">
              <div class="icon mb-2">
                <i class="bi bi-building"></i>
              </div>
              <h5>Project Tracking</h5>
              <p>Oversee construction progress</p>
              <a href="/accounts/login/" class="btn btn-custom w-100">Enter</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
