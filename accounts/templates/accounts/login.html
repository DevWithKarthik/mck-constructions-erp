<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login - Creative Advs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover no-repeat;
        height: 100vh;
      }
      
      .overlay {
        background: rgba(0, 0, 0, 0.75);
        position: absolute;
        width: 100%;
        height: 100%;
      }
      
      .login-container {
        position: relative;
        z-index: 2;
      }
      
      .login-card {
        background: rgba(28, 28, 28, 0.95);
        border-left: 5px solid #ffc107;
        border-radius: 12px;
        color: white;
      }
      
      .title {
        color: #ffc107;
        font-weight: bold;
      }
      
      .form-control {
        background: #2a2a2a;
        border: none;
        color: white;
      }
      
      .form-control::placeholder {
        color: #aaa;
      }
      
      .form-control:focus {
        background: #2a2a2a;
        color: white;
        box-shadow: none;
        border: 1px solid #ffc107;
      }
      
      .btn-custom {
        background: #ffc107;
        border: none;
        color: black;
        font-weight: bold;
      }
      
      .btn-custom:hover {
        background: #e0a800;
      }
      
      a {
        color: #ffc107;
        text-decoration: none;
      }
      
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="overlay"></div>

    <div class="container d-flex justify-content-center align-items-center vh-100 login-container">
      <div class="card login-card shadow p-4" style="width: 380px;">
        <h3 class="text-center title mb-3">🔐 Creative Advs</h3>
        <p class="text-center text-light small mb-3">Construction Management Login</p>

        {% if error %}
          <div class="alert alert-danger text-center p-2">{{ error }}</div>
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required />
          </div>

          <button type="submit" class="btn btn-custom w-100">Login</button>
        </form>

        <p class="text-center mt-3">
          Don’t have an account?
          <a href="/accounts/signup/">Signup</a>
        </p>
      </div>
    </div>
  </body>
</html>
